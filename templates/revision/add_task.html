<!DOCTYPE html>
<html>
<head>
    <title>Add Revision Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#07070d] text-white flex justify-center items-center h-screen">

    <form method="POST" class="bg-gray-900 p-8 rounded-2xl w-[500px]">
        {% csrf_token %}

        <h1 class="text-2xl font-bold mb-6">Add Revision Task</h1>

        <input
            type="text"
            name="title"
            placeholder="Task title"
            class="w-full p-3 rounded bg-black mb-4"
            required
        >

        <textarea
            name="description"
            placeholder="Description"
            class="w-full p-3 rounded bg-black mb-4"
        ></textarea>

        <input
            type="date"
            name="date"
            class="w-full p-3 rounded bg-black mb-4"
            required
        >

        <button class="bg-violet-600 px-5 py-3 rounded-xl w-full">
            Save Task
        </button>

    </form>

</body>
</html>
