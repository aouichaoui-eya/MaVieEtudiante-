<!DOCTYPE html>
<html>
<head>
    <title>Mark Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-10">

    <h1 class="text-2xl font-bold mb-6">Mark Attendance</h1>

    <form method="POST">
        {% csrf_token %}

        <button name="status" value="present"
                class="bg-green-600 px-5 py-3 rounded-xl mr-4">
            Present
        </button>

        <button name="status" value="absent"
                class="bg-red-600 px-5 py-3 rounded-xl">
            Absent
        </button>

    </form>

</body>
</html>
