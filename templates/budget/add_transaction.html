<!DOCTYPE html>
<html>
<head>
    <title>Add Transaction</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#07070d] text-white flex justify-center items-center h-screen">

<form method="POST" class="bg-gray-900 p-8 rounded-2xl w-[500px] space-y-4">
    {% csrf_token %}

    <h1 class="text-2xl font-bold mb-4">Add Transaction</h1>

    <input
        name="title"
        placeholder="Title"
        class="w-full p-3 rounded bg-black"
        required
    >

    <input
        type="number"
        step="0.01"
        name="amount"
        placeholder="Amount"
        class="w-full p-3 rounded bg-black"
        required
    >

    <select name="type" class="w-full p-3 rounded bg-black">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
    </select>

    <select name="category" class="w-full p-3 rounded bg-black">
        <option>Food</option>
        <option>Transport</option>
        <option>Rent</option>
        <option>Fun</option>
        <option>Other</option>
    </select>

    <button class="w-full bg-violet-600 p-3 rounded-xl">
        Save
    </button>

</form>

</body>
</html>
