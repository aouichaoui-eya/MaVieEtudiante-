<!DOCTYPE html>
<html>
<head>
    <title>Add Grade</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-10">

    <h1 class="text-2xl font-bold mb-6">Add New Grade</h1>

    <form method="POST">
        {% csrf_token %}

        <input name="subject" placeholder="Subject"
               class="p-3 rounded bg-gray-800 w-full mb-4">

        <input name="score" placeholder="Score"
               class="p-3 rounded bg-gray-800 w-full mb-4">

        <button class="bg-violet-600 px-6 py-3 rounded">
            Save Grade
        </button>
    </form>

</body>
</html>
